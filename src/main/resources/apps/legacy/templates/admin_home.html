<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Legacy Enterprise Portal - Admin Dashboard</title>
    <link rel="stylesheet" href="/static/legacy.css">
    <style>
        .admin-box {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
        }
        .btn-danger:hover {
            background-color: #bd2130;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="admin-box">
            System Administrator Session Active
        </div>
        <h1>Admin Control Panel</h1>
        <p>Welcome back, Administrator. You are logged into the Legacy Enterprise Portal.</p>
        <p>Use the links below to manage the system:</p>
        <ul>
            <li><a href="/profile?name=admin">View My Admin Profile</a></li>
            <li><a href="/api/v1/users">Manage Users (JSON API)</a></li>
            <li><a href="/api/v1/settings">System Settings (JSON API)</a></li>
        </ul>
        <hr>
        <button id="logout-btn" class="btn-danger">Logout</button>
    </div>

    <script>
        document.getElementById('logout-btn').addEventListener('click', function() {
            // Clear cookies
            document.cookie = "auth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
            document.cookie = "role=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
            // Redirect to root
            window.location.href = "/";
        });
    </script>
</body>
</html>
